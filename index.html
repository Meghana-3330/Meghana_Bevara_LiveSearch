<!DOCTYPE html>
<html>
<head>
    <title>Live Search Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Live Search</h2>

    <input type="text" id="searchBox" placeholder="Search items...">

    <ul id="itemList">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Orange</li>
        <li>Grapes</li>
    </ul>

    <p id="noResult" style="display:none;">No results found</p>

    <script src="script.js"></script>
</body>
</html>
